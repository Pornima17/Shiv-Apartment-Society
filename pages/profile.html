<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Profile</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>🏢 Shiv Apartment</h2>

        <ul>

            <li>
                <a href="dashboard.html">
                    <i class="fa-solid fa-gauge"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a class="active" href="profile.html">
                    <i class="fa-solid fa-user"></i>
                    Admin Profile
                </a>
            </li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main-content">

        <h1>👤 Admin Profile</h1>

        <div class="profile-card">

            <img
    id="profilePreview"
    src="../images/logo.png"
    alt="Admin">

            <input
            type="file"
            id="profilePhoto"
            accept="image/*">

            <br><br>

            <input
            type="text"
            id="adminName"
            placeholder="Admin Name">

            <input
            type="email"
            id="adminEmail"
            placeholder="Email">

            <input
            type="text"
            id="adminMobile"
            placeholder="Mobile">

            <input
            type="password"
            id="adminPassword"
            placeholder="New Password">

            <button id="saveProfile">

                Save Profile

            </button>

        </div>

    </div>

</div>

<script src="../js/script.js"></script>

</body>

</html>
