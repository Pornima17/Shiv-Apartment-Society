    <!-- Main Content -->

    <div class="main-content">

<h1>Notice Board</h1>

<p>
Manage all society notices and announcements here.
</p>

<div class="notice-top">

    <input
        type="text"
        id="searchNotice"
        placeholder="Search Notice...">

    <button id="addNoticeBtn">

        ➕ Add Notice

    </button>

    <button id="exportNotice">

        📥 Export CSV

    </button>

</div>

<div class="notice-form">

    <h2>📢 Add New Notice</h2>

    <div class="form-group">

        <div class="input-box">

            <label>Notice Title</label>

            <input
                type="text"
                id="noticeTitle"
                placeholder="Enter Notice Title">

        </div>

        <div class="input-box">

            <label>Notice Date</label>

            <input
                type="date"
                id="noticeDate">

        </div>

    </div>

    <div class="input-box">

        <label>Notice Description</label>

        <textarea
            id="noticeDescription"
            rows="6"
            placeholder="Write Notice Details..."></textarea>

    </div>

    <div class="form-buttons">

        <button
            id="saveNotice"
            class="save-btn">

            Save Notice

        </button>

        <button
            type="reset"
            class="cancel-btn">

            Clear

        </button>

    </div>

</div>

<div class="table-container">

    <h2>📋 Notice List</h2>

    <table id="noticeTable" class="notice-table">

        <thead>

            <tr>

                <th>ID</th>
                <th>Title</th>
                <th>Date</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="noticeTableBody">

        </tbody>

    </table>

</div>

    </div>

</div>
<!-- =========================
Notice View Modal
========================= -->

<div id="noticeModal" class="modal">

    <div class="modal-content">

        <span id="closeNoticeModal" class="close">&times;</span>

        <h2>📢 Notice Details</h2>

        <p><strong>ID:</strong> <span id="viewNoticeId"></span></p>

        <p><strong>Title:</strong> <span id="viewNoticeTitle"></span></p>

        <p><strong>Date:</strong> <span id="viewNoticeDate"></span></p>

        <p><strong>Description:</strong> <span id="viewNoticeDescription"></span></p>

    </div>

</div>

<script src="../js/script.js"></script>
</body>
