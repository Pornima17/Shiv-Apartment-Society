<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Residents</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>
    <script>

if (sessionStorage.getItem("adminLoggedIn") !== "true") {

    window.location.href = "admin-login.html";

}

</script>

<div class="dashboard">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>🏢 Shiv Apartment</h2>

        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a class="active" href="residents.html">Residents</a></li>

            <li><a href="complaints.html">Complaints</a></li>

<li><a href="maintenance.html">Maintenance</a></li>

            <li><a href="events.html">events</a></li>


<li><a href="notice.html">Notice</a></li>

            <li><a href="../index.html">Logout</a></li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <h1>Residents Management</h1>

        <p>Manage all society residents here.</p>

<div class="resident-top">

    <input
        type="text"
        id="searchResident"
        placeholder="Search Resident...">

    <button id="addResidentBtn">
        + Add Resident
    </button>

    <button
        id="exportResidents"
        class="export-btn">

        📥 Export CSV

    </button>

    <button
        id="importBtn"
        class="import-btn">

        📂 Import CSV

    </button>

    <input
        type="file"
        id="importResidents"
        accept=".csv"
        hidden>

</div>

<div class="table-container">

<table
    class="resident-table"
    id="residentTable">

    <thead>

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Flat No</th>
            <th>Mobile</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

    </thead>

    <tbody id="residentTableBody">

    </tbody>

</table>

</div>

<div class="resident-form">

    <h2>Add New Resident</h2>

<form id="residentForm">

    <div class="form-group">

        <label>Full Name</label>

        <input
            type="text"
            id="residentName"
            placeholder="Enter Full Name">

    </div>

    <div class="form-group">

        <label>Flat Number</label>

        <input
            type="text"
            id="flatNumber"
            placeholder="A-101">

    </div>

    <div class="form-group">

        <label>Mobile Number</label>

        <input
            type="text"
            id="mobileNumber"
            placeholder="9876543210">

    </div>

    <div class="form-group">

        <label>Email Address</label>

        <input
            type="email"
            id="email"
            placeholder="example@gmail.com">

    </div>

    <div class="form-group">

    <label>Resident Photo</label>

    <input
        type="file"
        id="residentPhoto"
        accept="image/*">

    <div class="photo-preview">

        <img
            id="photoPreview"
            src="../images/default-user.png"
            alt="Resident Photo">

    </div>

</div>

    <div class="form-group">

        <label>Family Members</label>

        <input
            type="number"
            id="familyMembers"
            placeholder="4">

    </div>

    <div class="form-group">

        <label>Status</label>

        <select id="residentStatus">

            <option value="Active">Active</option>

            <option value="Inactive">Inactive</option>

        </select>

    </div>

    <div class="form-buttons">

        <button
            type="button"
            class="save-btn"
            id="saveResident">

            Save Resident

        </button>

        <button
            type="reset"
            class="cancel-btn">

            Clear

        </button>

    </div>

</form>

</div>

<!-- =========================
Resident View Modal
========================= -->

<div id="residentModal" class="modal">

    <div class="modal-content">

        <span id="closeModal" class="close">&times;</span>

        <!-- Header -->

        <div class="resident-view-header">

            <img
                id="viewPhoto"
                src="../images/default-user.png"
                alt="Resident Photo">

            <h2 id="viewName"></h2>

            <p id="viewFlat"></p>

        </div>

        <!-- Details -->

        <div class="resident-details">

            <div class="detail-item">

                <span>Resident ID</span>

                <strong id="viewId"></strong>

            </div>

            <div class="detail-item">

                <span>Mobile Number</span>

                <strong id="viewMobile"></strong>

            </div>

            <div class="detail-item">

                <span>Email Address</span>

                <strong id="viewEmail"></strong>

            </div>

            <div class="detail-item">

                <span>Family Members</span>

                <strong id="viewFamily"></strong>

            </div>

            <div class="detail-item">

                <span>Status</span>

<span
    id="viewStatus"
    class="status-badge">

</span>
            </div>

        </div>

        <div class="modal-footer">

    <button
        id="printResident"
        class="print-btn">

        🖨 Print

    </button>

    <button
        id="closeResidentBtn"
        class="close-btn-modal">

        Close

    </button>

</div>

    </div>

</div>

<script src="../js/script.js"></script>

</body>

</html>
